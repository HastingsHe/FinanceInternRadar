<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - FinanceInternRadar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #d4e4fc 50%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 400px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(59, 130, 246, 0.12), 0 2px 8px rgba(0, 0, 0, 0.04);
            padding: 44px 40px;
            text-align: center;
        }
        .login-card .logo {
            font-size: 28px;
            font-weight: 800;
            color: #1e3a5f;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .login-card .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #d1dbe8;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: #f8fafd;
            color: #1e293b;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: #fff;
        }
        .form-group input::placeholder {
            color: #94a3b8;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            min-height: 18px;
        }
        .back-link {
            display: block;
            margin-top: 18px;
            font-size: 13px;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">FinanceInternRadar</div>
        <p class="subtitle">用户数据管理 · 管理员登录</p>

        <div class="form-group">
            <label for="admin-username">用户名</label>
            <input type="text" id="admin-username" placeholder="输入管理员用户名" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="admin-password">密码</label>
            <input type="password" id="admin-password" placeholder="输入管理员密码" autocomplete="current-password">
        </div>

        <button class="btn-login" id="login-btn">登录</button>
        <div class="error-msg" id="login-error"></div>
        <a href="/" class="back-link">返回首页</a>
    </div>

    <script>
    document.getElementById('login-btn').addEventListener('click', async () => {
        const username = document.getElementById('admin-username').value.trim();
        const password = document.getElementById('admin-password').value;
        const errorEl = document.getElementById('login-error');
        errorEl.textContent = '';

        if (!username || !password) {
            errorEl.textContent = '请输入用户名和密码';
            return;
        }

        const resp = await fetch('/api/admin/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: new URLSearchParams({username, password})
        });

        if (resp.ok) {
            window.location.href = '/admin/dashboard';
        } else {
            const data = await resp.json();
            errorEl.textContent = data.message || '登录失败';
        }
    });

    document.querySelectorAll('input').forEach(el => {
        el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });
    });
    </script>
</body>
</html>
