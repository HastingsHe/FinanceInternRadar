<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FinanceInternRadar{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="logo">
                <span class="logo-icon">&#9651;</span>
                FinanceInternRadar
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/companies" class="nav-link">Companies</a>
                <a href="/daily-picks" class="nav-link">Daily Picks</a>
                <a href="/subscribe" class="nav-link nav-cta">Subscribe</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-inner">
            <p>FinanceInternRadar &mdash; Your finance internship compass.</p>
            <p class="footer-disclaimer">Predictions are estimates based on historical data. Always verify on official careers pages.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
